name: Build and deploy Python app to Azure Web App - jeff77-rag-chat

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python version
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # Fixes the monorepo layout by jumping straight into the webapp folder
      - name: Install dependencies
        run: |
          cd webapp
          pip install -r requirements.txt

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: python-app
          path: .

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: python-app

      - name: 'Deploy to Azure Web App'
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: 'jeff77-rag-chat'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISH_PROFILE_JEFF77RAGCHAT }}
