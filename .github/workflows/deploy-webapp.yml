name: Deploy WebApp to Azure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'jeff77-rag-chat'
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./webapp

      - name: Force install streamlit via SCM
        run: |
          curl -X POST https://jeff77-rag-chat.scm.azurewebsites.net/api/command \
            -u "${{ secrets.SCM_CREDENTIALS }}" \
            -H "Content-Type: application/json" \
            -d '{"command": "pip install streamlit requests python-dotenv", "dir": "/home/site/wwwroot"}'
